<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" width="780" height="480" font-family="monospace, sans-serif">
  <rect width="780" height="480" fill="#0d1117"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">BusTimer — Architecture</text>

  <!-- ── Raspberry Pi box ───────────────────────────────── -->
  <rect x="20" y="56" width="500" height="390" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="36" y="78" fill="#8b949e" font-size="12">Raspberry Pi 3</text>

  <!-- GUI Thread box -->
  <rect x="40" y="88" width="460" height="200" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="56" y="108" fill="#8b949e" font-size="11">GUI Thread</text>

  <!-- main.py -->
  <rect x="60" y="116" width="120" height="44" rx="6" fill="#1f2937" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="120" y="135" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">main.py</text>
  <text x="120" y="151" text-anchor="middle" fill="#8b949e" font-size="10">QGuiApplication</text>

  <!-- bustimer.qml -->
  <rect x="220" y="116" width="130" height="44" rx="6" fill="#1f2937" stroke="#3fb950" stroke-width="1.5"/>
  <text x="285" y="135" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">bustimer.qml</text>
  <text x="285" y="151" text-anchor="middle" fill="#8b949e" font-size="10">800×480 UI</text>

  <!-- bus_model.py -->
  <rect x="390" y="116" width="90" height="44" rx="6" fill="#1f2937" stroke="#d29922" stroke-width="1.5"/>
  <text x="435" y="135" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">bus_model</text>
  <text x="435" y="151" text-anchor="middle" fill="#8b949e" font-size="10">ListModel</text>

  <!-- arrow main → qml -->
  <line x1="180" y1="138" x2="220" y2="138" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- arrow qml ↔ model -->
  <line x1="350" y1="138" x2="390" y2="138" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="365" y="130" text-anchor="middle" fill="#8b949e" font-size="9">roles</text>

  <!-- config.py -->
  <rect x="60" y="200" width="110" height="40" rx="6" fill="#1f2937" stroke="#8b949e" stroke-width="1"/>
  <text x="115" y="219" text-anchor="middle" fill="#8b949e" font-size="12">config.py</text>
  <text x="115" y="233" text-anchor="middle" fill="#8b949e" font-size="10">reads os.environ</text>

  <!-- /etc/bustimer.env -->
  <rect x="60" y="256" width="110" height="40" rx="6" fill="#1f2937" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="115" y="272" text-anchor="middle" fill="#8b949e" font-size="11">/etc/bustimer.env</text>
  <text x="115" y="286" text-anchor="middle" fill="#8b949e" font-size="10">API key, timings</text>
  <line x1="115" y1="256" x2="115" y2="240" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)"/>

  <!-- DataFetcher box -->
  <rect x="40" y="308" width="460" height="120" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="56" y="328" fill="#8b949e" font-size="11">DataFetcher (QThread)</text>

  <!-- data_fetcher.py -->
  <rect x="60" y="336" width="130" height="44" rx="6" fill="#1f2937" stroke="#f85149" stroke-width="1.5"/>
  <text x="125" y="355" text-anchor="middle" fill="#f85149" font-size="12" font-weight="bold">data_fetcher.py</text>
  <text x="125" y="371" text-anchor="middle" fill="#8b949e" font-size="10">poll · match · emit</text>

  <!-- rowsReady signal arrow up to bus_model -->
  <line x1="435" y1="310" x2="435" y2="162" stroke="#d29922" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrY)"/>
  <text x="448" y="250" fill="#d29922" font-size="10">rowsReady</text>
  <text x="448" y="263" fill="#d29922" font-size="10">(queued)</text>

  <!-- alertChanged arrow up to main -->
  <line x1="200" y1="310" x2="120" y2="162" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="138" y="248" fill="#8b949e" font-size="9">alert /</text>
  <text x="138" y="260" fill="#8b949e" font-size="9">status</text>

  <!-- ── External APIs ───────────────────────────────────── -->
  <rect x="560" y="56" width="200" height="390" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <text x="660" y="78" text-anchor="middle" fill="#8b949e" font-size="12">External APIs</text>

  <!-- SL Transport -->
  <rect x="578" y="100" width="164" height="80" rx="6" fill="#1f2937" stroke="#3fb950" stroke-width="1.5"/>
  <text x="660" y="122" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">SL Transport</text>
  <text x="660" y="140" text-anchor="middle" fill="#8b949e" font-size="10">transport.integration.sl.se</text>
  <text x="660" y="156" text-anchor="middle" fill="#8b949e" font-size="10">departures — every 30s</text>
  <text x="660" y="170" text-anchor="middle" fill="#8b949e" font-size="10">no API key required</text>

  <!-- SL Deviations -->
  <rect x="578" y="200" width="164" height="70" rx="6" fill="#1f2937" stroke="#d29922" stroke-width="1.5"/>
  <text x="660" y="222" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">SL Deviations</text>
  <text x="660" y="240" text-anchor="middle" fill="#8b949e" font-size="10">deviations.integration.sl.se</text>
  <text x="660" y="256" text-anchor="middle" fill="#8b949e" font-size="10">alerts — every 60s</text>

  <!-- Trafiklab -->
  <rect x="578" y="290" width="164" height="70" rx="6" fill="#1f2937" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="660" y="312" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">Trafiklab</text>
  <text x="660" y="330" text-anchor="middle" fill="#8b949e" font-size="10">realtime-api.trafiklab.se</text>
  <text x="660" y="346" text-anchor="middle" fill="#8b949e" font-size="10">stop ID lookup (startup)</text>

  <!-- Arrows: DataFetcher → APIs -->
  <line x1="520" y1="358" x2="578" y2="140" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="520" y1="362" x2="578" y2="235" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrY)"/>
  <line x1="520" y1="366" x2="578" y2="325" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- Screen box at bottom -->
  <rect x="40" y="430" width="200" height="36" rx="6" fill="#1f2937" stroke="#8b949e" stroke-width="1"/>
  <text x="140" y="453" text-anchor="middle" fill="#8b949e" font-size="11">HDMI  800×480  eglfs/KMS</text>

  <!-- Arrow qml → screen -->
  <line x1="285" y1="162" x2="140" y2="430" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrG)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#30363d"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/></marker>
    <marker id="arrY" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#d29922"/></marker>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/></marker>
  </defs>
</svg>
